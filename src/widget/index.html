<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMusic</title>
  <link rel="stylesheet" href="/widget.css" />
</head>
<body>
  <div class="background" id="bg"></div>

  <audio id="audio" preload="metadata"></audio>

  <div class="container">
    <ul class="lrc-list" id="lrc-list"></ul>
  </div>

  <div id="songstatus">
    <button id="searchToggle" type="button" title="搜索 / 切换" aria-label="搜索">
      <span aria-hidden="true">⌕</span>
    </button>
    <div id="songstatus_pic" tabindex="0" role="button" aria-label="播放 / 暂停">
      <div id="status_pic"></div>
      <div id="discpointer_pic"></div>
    </div>
  </div>

  <div id="search-panel" hidden>
    <div class="search-row">
      <label for="server">服务源</label>
      <select id="server">
        <option value="ytmusic" selected>YouTube Music</option>
        <option value="netease">网易云</option>
        <option value="tencent">QQ 音乐</option>
        <option value="kugou">酷狗</option>
        <option value="baidu">百度</option>
        <option value="kuwo">酷我</option>
        <option value="spotify">Spotify</option>
      </select>
    </div>
    <div class="search-row">
      <input id="query" type="search" placeholder="搜索曲名 / 歌手 / 关键词" autocomplete="off" />
      <button id="searchBtn" type="button">搜索</button>
    </div>
    <ul id="results" class="results-list"></ul>
    <div id="search-status" class="search-status" hidden></div>
  </div>

  <div id="now-playing" hidden>
    <span id="now-title"></span>
    <span class="sep">·</span>
    <span id="now-author"></span>
  </div>

  <div id="version-info">
    RMusic widget
    <div class="update-details">
      搜索接 Meting-API,token 走 worker env,无密码直接用。
      <br />
      点击右上角 ⌕ 展开搜索面板,默认 YouTube Music。
      <br />
      点唱片切换播放 / 暂停。
    </div>
  </div>

  <script src="/widget.js" defer></script>
</body>
</html>
